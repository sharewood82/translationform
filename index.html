<script>
  const STRIPE_LINK = "https://buy.stripe.com/cN2eXCfM5b5a6Ig8ww";

  function calculateTotal() {
    const pages = parseInt(document.getElementById("pages").value, 10) || 0;
    const rush = document.getElementById("rush").value;
    const notarized = document.getElementById("notarized").value;

    if (pages < 1) {
      document.getElementById("total").innerText = "0";
      return 0;
    }

    // BASE PRICE
    let base = 75;
    if (pages > 1) base += (pages - 1) * 50;

    // NOTARIZATION +$75
    if (notarized === "Yes") base += 75;

    // RUSH +50%
    if (rush === "Yes") base *= 1.5;

    // STRIPE FEES
    const withFees = base * 1.029 + 0.30;

    const finalTotal = Math.ceil(withFees);

    document.getElementById("total").innerText = finalTotal;
    return finalTotal;
  }

  document.querySelectorAll("input, select, textarea").forEach(el => {
    el.addEventListener("input", calculateTotal);
    el.addEventListener("change", calculateTotal);
  });

  function goToPayment() {
    const total = calculateTotal();
    if (!total || total < 1) return alert("Please enter a valid page count.");
    if (!document.getElementById("deadline").value) return alert("Please confirm the deadline selection.");

    if (!STRIPE_LINK) {
      return alert("Stripe link not set.");
    }

    window.location.href = STRIPE_LINK;
  }
